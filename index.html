<!DOCTYPE html>
<!-- HUD TODO — v1.0 — 2026-03-28 -->
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HUD Task Manager v1.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cyan: #00f5ff;
    --cyan-dim: rgba(0,245,255,0.15);
    --cyan-mid: rgba(0,245,255,0.4);
    --cyan-glow: rgba(0,245,255,0.08);
    --red: #ff3c3c;
    --amber: #ff8c00;
    --green: #39ff85;
    --bg: #020c10;
    --bg2: #04151c;
    --text: #a8eaf0;
    --text-dim: rgba(168,234,240,0.45);
    --mono: 'Share Tech Mono', monospace;
    --head: 'Orbitron', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .hud {
    width: 100%;
    max-width: 640px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 1.4rem;
    position: relative;
    border: 1px solid var(--cyan-mid);
    box-shadow: 0 0 40px rgba(0,245,255,0.06), inset 0 0 60px rgba(0,245,255,0.02);
    overflow: hidden;
  }

  .hud::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,245,255,0.015) 2px, rgba(0,245,255,0.015) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .hud > * { position: relative; z-index: 1; }

  .hud-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--cyan-mid);
    position: relative;
  }
  .hud-header::after {
    content: '';
    position: absolute;
    bottom: -3px; left: 0;
    width: 40%; height: 1px;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }

  .hud-title { font-family: var(--head); font-size: 13px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; }
  .hud-id { font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    display: inline-block;
    margin-right: 6px;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.2rem; }

  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--cyan-mid);
    padding: 8px 10px;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
  }
  .stat-box::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
  .stat-n { font-family: var(--head); font-size: 22px; color: var(--cyan); line-height: 1; text-shadow: 0 0 12px var(--cyan); }
  .stat-l { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  .input-zone { display: flex; gap: 6px; margin-bottom: 1.2rem; align-items: center; }

  .hud-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--cyan-mid);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s, box-shadow 0.2s;
    height: 36px;
  }
  .hud-input::placeholder { color: var(--text-dim); }
  .hud-input:focus { border-color: var(--cyan); box-shadow: 0 0 12px var(--cyan-dim), inset 0 0 8px var(--cyan-glow); }

  .sphere-pick { display: flex; gap: 6px; align-items: center; }

  .sphere {
    width: 18px; height: 18px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: transform 0.15s;
    flex-shrink: 0;
    border: 2px solid transparent;
  }
  .sphere::after {
    content: '';
    position: absolute;
    top: 2px; left: 3px;
    width: 5px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
  }
  .sphere:hover { transform: scale(1.2); }

  .sphere.s-high { background: radial-gradient(circle at 35% 35%, #ff7070, #ff3c3c, #8b0000); box-shadow: 0 0 6px rgba(255,60,60,0.6); }
  .sphere.s-med  { background: radial-gradient(circle at 35% 35%, #ffb84d, #ff8c00, #7a3d00); box-shadow: 0 0 6px rgba(255,140,0,0.6); }
  .sphere.s-low  { background: radial-gradient(circle at 35% 35%, #80ffb3, #39ff85, #0a6630); box-shadow: 0 0 6px rgba(57,255,133,0.6); }

  .sphere.active.s-high { border-color: var(--red); box-shadow: 0 0 12px rgba(255,60,60,0.9), 0 0 20px rgba(255,60,60,0.4); transform: scale(1.25); }
  .sphere.active.s-med  { border-color: var(--amber); box-shadow: 0 0 12px rgba(255,140,0,0.9), 0 0 20px rgba(255,140,0,0.4); transform: scale(1.25); }
  .sphere.active.s-low  { border-color: var(--green); box-shadow: 0 0 12px rgba(57,255,133,0.9), 0 0 20px rgba(57,255,133,0.4); transform: scale(1.25); }

  .hud-btn {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: var(--head);
    font-size: 10px;
    padding: 0 14px;
    height: 36px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.15s;
    clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hud-btn::before { content:''; position:absolute; inset:0; background:var(--cyan-dim); opacity:0; transition:opacity 0.15s; }
  .hud-btn:hover::before { opacity:1; }
  .hud-btn:hover { box-shadow: 0 0 16px var(--cyan-dim); }
  .hud-btn:active { transform: scale(0.97); }

  .section-label {
    font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase;
    margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:linear-gradient(to right, var(--cyan-mid), transparent); }

  .task-list { display: flex; flex-direction: column; gap: 5px; }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: var(--bg2);
    border: 1px solid rgba(0,245,255,0.12);
    border-left: 2px solid var(--cyan);
    transition: all 0.2s;
    animation: slide-in 0.25s ease;
  }
  @keyframes slide-in { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
  .task-item:hover { border-color: var(--cyan-mid); background: rgba(0,245,255,0.04); }
  .task-item.done { border-left-color: rgba(0,245,255,0.2); opacity: 0.45; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text-dim); }
  .task-item.prio-high { border-left-color: var(--red); }
  .task-item.prio-high:not(.done) { background: rgba(255,60,60,0.03); }
  .task-item.prio-low { border-left-color: rgba(57,255,133,0.5); }
  .task-item.prio-med { border-left-color: var(--amber); }

  .hud-check {
    appearance: none; width:14px; height:14px;
    border: 1px solid var(--cyan-mid); background: transparent;
    cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.15s;
  }
  .hud-check:checked { background: var(--cyan-dim); border-color: var(--cyan); }
  .hud-check:checked::after { content:'✓'; position:absolute; top:-2px; left:1px; font-size:11px; color:var(--cyan); }

  .task-text { flex: 1; font-size: 12px; letter-spacing: 0.5px; color: var(--text); }

  .task-sphere {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .task-sphere::after { content:''; position:absolute; top:1px; left:2px; width:3px; height:2px; border-radius:50%; background:rgba(255,255,255,0.35); }
  .task-sphere.high { background: radial-gradient(circle at 35% 35%, #ff7070, #ff3c3c, #8b0000); box-shadow: 0 0 4px rgba(255,60,60,0.7); }
  .task-sphere.med  { background: radial-gradient(circle at 35% 35%, #ffb84d, #ff8c00, #7a3d00); box-shadow: 0 0 4px rgba(255,140,0,0.7); }
  .task-sphere.low  { background: radial-gradient(circle at 35% 35%, #80ffb3, #39ff85, #0a6630); box-shadow: 0 0 4px rgba(57,255,133,0.7); }

  .del-btn { background:none; border:none; color:rgba(255,60,60,0.4); cursor:pointer; font-size:12px; padding:0 2px; transition:color 0.15s; font-family:var(--mono); flex-shrink:0; }
  .del-btn:hover { color: var(--red); }

  .empty-state { text-align:center; color:var(--text-dim); font-size:11px; letter-spacing:2px; padding:2rem 0; text-transform:uppercase; }
  .empty-state::before { display:block; content:'[ AUCUNE TÂCHE ACTIVE ]'; color:var(--cyan-mid); margin-bottom:4px; font-family:var(--head); font-size:10px; }

  .corner-tl, .corner-br { position:absolute; width:12px; height:12px; pointer-events:none; }
  .corner-tl { top:0; left:0; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
  .corner-br { bottom:0; right:0; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }

  .progress-wrap { margin-bottom: 6px; background:var(--bg2); border:1px solid var(--cyan-mid); height:4px; position:relative; overflow:visible; }
  .progress-bar { height:100%; background:var(--cyan); box-shadow:0 0 10px var(--cyan); transition:width 0.4s ease; position:relative; }
  .progress-bar::after { content:''; position:absolute; right:0; top:-2px; width:1px; height:8px; background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
  .progress-label { font-size:9px; color:var(--text-dim); letter-spacing:2px; text-align:right; margin-top:4px; margin-bottom:10px; text-transform:uppercase; }

  .scanline { position:absolute; left:0; right:0; height:2px; background:linear-gradient(to bottom,transparent,rgba(0,245,255,0.06),transparent); animation:scan 6s linear infinite; pointer-events:none; z-index:2; }
  @keyframes scan { from{top:-2px} to{top:100%} }

  @media (max-width: 480px) {
    html, body { padding: 0; }
    .hud { border: none; min-height: 100vh; }
    .stat-n { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="hud">
  <div class="scanline"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="hud-header">
    <div>
      <div class="hud-title">◈ Tactical Task Manager</div>
      <div class="hud-id"><span class="status-dot"></span>SYS.ONLINE — OPR.AUTHENTICATED</div>
    </div>
    <div class="hud-id" id="clock-display">00:00:00</div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-n" id="s-total">0</div><div class="stat-l">Missions</div></div>
    <div class="stat-box"><div class="stat-n" id="s-done">0</div><div class="stat-l">Exécutées</div></div>
    <div class="stat-box"><div class="stat-n" id="s-remain">0</div><div class="stat-l">En attente</div></div>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div class="progress-label" id="progress-label">COMPLETION — 0%</div>

  <div class="input-zone">
    <input class="hud-input" id="inp" type="text" placeholder="◌ Entrer directive..." />
    <div class="sphere-pick">
      <div class="sphere s-high active" id="sp-high" onclick="selectPrio('high')" title="Critique"></div>
      <div class="sphere s-med"         id="sp-med"  onclick="selectPrio('med')"  title="Normal"></div>
      <div class="sphere s-low"         id="sp-low"  onclick="selectPrio('low')"  title="Basse"></div>
    </div>
    <button class="hud-btn" onclick="addTask()">▶ EXEC</button>
  </div>

  <div class="section-label">Directives actives</div>
  <div class="task-list" id="list"></div>
</div>

<script>
  let tasks = [];
  let currentPrio = 'high';

  function selectPrio(p) {
    currentPrio = p;
    ['high','med','low'].forEach(x => {
      const el = document.getElementById('sp-' + x);
      el.className = 'sphere s-' + x + (x === p ? ' active' : '');
    });
  }

  function updateClock() {
    const n = new Date();
    const pad = v => String(v).padStart(2,'0');
    document.getElementById('clock-display').textContent =
      pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
  }
  setInterval(updateClock, 1000);
  updateClock();

  function load() {
    try { const r = localStorage.getItem('hud_tasks'); if (r) tasks = JSON.parse(r); } catch(e) { tasks = []; }
    render();
  }
  function save() { try { localStorage.setItem('hud_tasks', JSON.stringify(tasks)); } catch(e) {} }

  function addTask() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text, prio: currentPrio, done: false });
    inp.value = '';
    save(); render();
  }

  function toggle(id) { const t = tasks.find(t => t.id === id); if (t) { t.done = !t.done; save(); render(); } }
  function del(id) { tasks = tasks.filter(t => t.id !== id); save(); render(); }

  function render() {
    const done = tasks.filter(t => t.done).length;
    const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;
    document.getElementById('s-total').textContent = tasks.length;
    document.getElementById('s-done').textContent = done;
    document.getElementById('s-remain').textContent = tasks.length - done;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = 'COMPLETION — ' + pct + '%';

    const list = document.getElementById('list');
    if (!tasks.length) { list.innerHTML = '<div class="empty-state">Aucune directive en cours</div>'; return; }

    list.innerHTML = tasks.map(t => `
      <div class="task-item prio-${t.prio}${t.done ? ' done' : ''}">
        <input class="hud-check" type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
        <div class="task-sphere ${t.prio}"></div>
        <span class="task-text">${t.text}</span>
        <button class="del-btn" onclick="del(${t.id})">✕</button>
      </div>
    `).join('');
  }

  document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  load();
</script>
</body>
</html>
