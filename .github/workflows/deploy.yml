name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'SRC/hud_todo_v*.html'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Find latest version
        id: find
        run: |
          LATEST=$(ls SRC/hud_todo_v*.html | sort -V | tail -1)
          echo "file=$LATEST" >> $GITHUB_OUTPUT

      - name: Prepare gh-pages
        run: |
          mkdir -p gh-pages
          cp "${{ steps.find.outputs.file }}" gh-pages/index.html
          cp DEPLOY/HUD.ico gh-pages/HUD.ico

      - name: Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4.7.3
        with:
          folder: gh-pages
          branch: gh-pages
          commit-message: "deploy: ${{ steps.find.outputs.file }}"
